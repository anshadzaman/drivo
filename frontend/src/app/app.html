<header class="app-header">
  <a class="brand" routerLink="/" aria-label="Drivo dashboard">
    <span class="brand-icon">🚚</span>
    <span class="brand-name">Drivo</span>
  </a>

  <nav class="main-nav" aria-label="Primary navigation">
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Dashboards
    </a>

    <a routerLink="/users" routerLinkActive="active">
      Users
    </a>

    <a routerLink="/shipments" routerLinkActive="active">
      Shipments
    </a>

    <a routerLink="/create-shipment" routerLinkActive="active" class="primary-link">
      Create Shipment
    </a>
  </nav>
</header>

<main class="page-content">
  <router-outlet></router-outlet>
</main>
