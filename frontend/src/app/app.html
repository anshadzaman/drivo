<header class="app-header">
  <a class="brand" routerLink="/" aria-label="Drivo dashboard">
    <span class="brand-icon">🚚</span>
    <span class="brand-name">Drivo</span>
  </a>

  @if (isLoggedIn()) {

  <div class="header-actions">

    <nav class="main-nav" aria-label="Primary navigation">

      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{
          exact: true
        }">
        Dashboard
      </a>

      @if (getRole() === 'ADMIN') {

      <a routerLink="/users" routerLinkActive="active">
        Users
      </a>

      }

      @if (getRole() === 'SHOP') {

      <a routerLink="/shipments" routerLinkActive="active">
        Shipments
      </a>

      <a routerLink="/create-shipment" routerLinkActive="active" class="primary-link">
        Create Shipment
      </a>

      }

      @if (getRole() === 'DRIVER') {

      <a routerLink="/my-shipments" routerLinkActive="active">
        My Shipments
      </a>
      <a routerLink="/notifications">
  Notifications
</a>
      }

    </nav>

    <button type="button" class="logout-button" (click)="logout()">
      Logout
    </button>

  </div>

  }

</header>

<main class="page-content">
  <router-outlet></router-outlet>
</main>
