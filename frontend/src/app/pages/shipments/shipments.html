<h2>Shipments</h2>


@if(shipments.length === 0) {
  <p class="no-shipments">No shipments found</p>
}
@for(shipment of shipments; track shipment.id) {

  <div>
    <strong>{{ shipment.id }}</strong>
    -
    {{ shipment.pickupLocation }}
    →
    {{ shipment.dropLocation }}
    -
    {{ shipment.itemName }}

    <button
      type="button"
      (click)="deleteShipment(shipment.id)">
      Delete
    </button>
    <button
  [routerLink]="['/edit-shipment', shipment.id]">

  Edit

</button>
  </div>

}
