<h2>Edit Shipment</h2>

<input
  name="pickupLocation"
  [(ngModel)]="pickupLocation"
  placeholder="Pickup Location">

<br><br>

<input
  name="dropLocation"
  [(ngModel)]="dropLocation"
  placeholder="Drop Location">

<br><br>

<input
  name="itemName"
  [(ngModel)]="itemName"
  placeholder="Item Name">

<br><br>

<button
  type="button"
  (click)="updateShipment()">

  Save Changes

</button>
